version: "3.9"

services:
  app:
    image: khoi/rag-agent:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment: 
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_URL=postgresql://rag:rag@postgres:5432/rag_agent
      - REDIS_URL=redis://redis:6379
      - RERANKER_SERVICE_URL=http://reranker:8002
      - MCP_VECTOR_SEARCH_URL=http://vector-search:8010/mcp
      - MCP_WEB_SEARCH_URL=http://web-search:8011/mcp
      - MCP_DATABASE_SEARCH_URL=http://database-search:8012/mcp
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web-search:
        condition: service_started
      vector-search:
        condition: service_started
    restart: unless-stopped
    volumes:
      - .:/app
    command: uvicorn rag_agent.main:app --host 0.0.0.0 --port 8000 --reload

  vector-search:
    image: khoi/rag-agent-mcp:latest
    command: python vector_search.py
    ports:
      - "8010:8010"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

  web-search:
    image: khoi/rag-agent-mcp:latest
    command: python web_search.py
    ports:
      - "8011:8011"
    env_file: .env
    restart: unless-stopped
  
  reranker:
    image: khoi/reranker:latest
    ports:
      - "8002:8002"
    environment:
      - USE_FP16=true
    volumes:
      - model_cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    profiles: ["gpu"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  model_cache:
